# VI Relay — nginx reverse proxy
# Certbot will append ssl_certificate / ssl_certificate_key lines after
# running: certbot --nginx -d relay.dynastylab.ai

server {
    listen 80;
    server_name relay.dynastylab.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name relay.dynastylab.ai;

    # Certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/relay.dynastylab.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/relay.dynastylab.ai/privkey.pem;

    # WebSocket + long-poll support (required by relay SSE and vi-agent WS)
    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
