# VI Relay — nginx reverse proxy
# Certbot will append ssl_certificate / ssl_certificate_key lines after
# running: certbot --nginx -d relay.dynastylab.ai

# HTTP-only block — Certbot will add the HTTPS block and redirect automatically.
# Do NOT add a 443 ssl block here; nginx must start before Certbot can obtain a cert.
server {
    listen 80;
    server_name relay.dynastylab.ai;

    # WebSocket + long-poll support (required by relay SSE and vi-agent WS)
    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
