app = "pi-relay"
primary_region = "sin"   # Singapore — change to nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PI_RELAY_PORT    = "8787"
  PI_RELAY_HOST    = "0.0.0.0"
  PI_RELAY_DB_PATH = "/data/pi-relay.db"

# Persistent volume — REQUIRED for production.
# Create before first deploy: fly volumes create pi_relay_data --size 1 --region sin
[mounts]
  source      = "pi_relay_data"
  destination = "/data"

[[services]]
  internal_port = 8787
  protocol = "tcp"

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [services.http_checks]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    path = "/health"

[metrics]
  port = 9091
  path = "/metrics"
