app            = "pi-relay-jozzy"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PI_RELAY_PORT    = "8787"
  PI_RELAY_HOST    = "0.0.0.0"
  PI_RELAY_DB_PATH = "/data/pi-relay.db"

# Machine size — smallest shared tier, 256 MB RAM
[vm]
  cpu_kind   = "shared"
  cpus       = 1
  memory_mb  = 256

# Persistent volume — REQUIRED. Create before first deploy:
#   fly volumes create pi_relay_data --size 1 --region sin --app pi-relay
[mounts]
  source      = "pi_relay_data"
  destination = "/data"

[[services]]
  internal_port        = 8787
  protocol             = "tcp"
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  # HTTPS (TLS terminated by Fly proxy)
  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  # HTTP — redirect to HTTPS
  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true

  # Health check — used to gate deploys
  [services.http_checks]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"
    path         = "/health"
