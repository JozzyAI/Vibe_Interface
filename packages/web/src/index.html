<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PI Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Project Interface</p>
          <h1>Idea factory, approval inbox, and recovery console for AO.</h1>
          <p class="lede">
            This dashboard turns AO into a 24/7 control plane: intake ideas, supervise queued
            work, answer agent questions, approve plans, and restore interrupted sessions.
          </p>
        </div>
        <div class="hero-stat" id="counts"></div>
      </header>

      <section class="grid top-grid">
        <article class="panel panel-accent">
          <div class="panel-head">
            <h2>Inbox / Requests</h2>
            <span id="inbox-count" class="pill"></span>
          </div>
          <div id="inbox" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Backlog</h2>
            <span id="queue-count" class="pill"></span>
          </div>
          <div id="backlog" class="stack"></div>
        </article>
      </section>

      <section class="grid bottom-grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Active Agents</h2>
            <span id="active-count" class="pill"></span>
          </div>
          <div id="active-agents" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Recovery</h2>
            <span id="recovery-count" class="pill"></span>
          </div>
          <div id="recovery" class="stack"></div>
        </article>
      </section>
    </main>

    <div id="detail-overlay" class="detail-overlay"></div>
    <aside id="session-detail" class="detail-drawer"></aside>

    <script type="module" src="/app.js"></script>
  </body>
</html>
